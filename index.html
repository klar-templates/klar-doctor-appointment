                  <div
                    style={{
                      color: "var(--text-tertiary)",
                      padding: "var(--space-md)",
                    }}
                  >
                    Inga användare.
                  </div>
                ) : (
                  filtered.map((u) => {
                    const active = u.id === selId;
                    return (
                      <button
                        key={u.id}
                        onClick={() => openUser(u.id)}
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: "var(--space-sm)",
                          width: "100%",
                          textAlign: "left",
                          padding: "var(--space-sm)",
                          marginBottom: "6px",
                          borderRadius: "var(--radius-md)",
                          cursor: "pointer",
                          color: "var(--text-primary)",
                          border:
                            "1px solid " +
                            (active ? "var(--accent)" : "var(--border-color)"),
                          background: active
                            ? "var(--accent-soft)"
                            : "var(--bg-elevated)",
                        }}
                      >
                        <Avatar user={u} />
                        <span style={{ flex: 1, minWidth: 0 }}>
                          <span
                            style={{
                              display: "block",
                              fontWeight: 600,
                              fontSize: "14px",
                              whiteSpace: "nowrap",
                              overflow: "hidden",
                              textOverflow: "ellipsis",
                            }}
                          >
                            {u.name || u.email}
                          </span>
                          <span
                            style={{
                              display: "block",
                              fontSize: "12px",
                              color: "var(--text-tertiary)",
                            }}
                          >
                            {u.dataKeys} nycklar · {u.records} poster
                          </span>
                        </span>
                      </button>
                    );
                  })
                )}
              </div>

              <div style={{ flex: "2 1 420px", minWidth: "300px" }}>
                {selId == null ? (
                  <div
                    style={{
                      padding: "var(--space-2xl)",
                      textAlign: "center",
                      color: "var(--text-tertiary)",
                      border: "1px dashed var(--border-color)",
                      borderRadius: "var(--radius-lg)",
                    }}
                  >
                    Välj en användare för att se och redigera detaljerna.
                  </div>
                ) : detailLoading || !detail ? (
                  <div
                    style={{
                      padding: "var(--space-2xl)",
                      textAlign: "center",
                      color: "var(--text-tertiary)",
                    }}
                  >
                    Läser in…
                  </div>
                ) : (
                  <>
                    <div
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: "var(--space-md)",
                        padding: "var(--space-lg)",
                        borderRadius: "var(--radius-lg)",
                        background: "var(--bg-elevated)",
                        border: "1px solid var(--border-color)",
                        marginBottom: "var(--space-lg)",
                      }}
                    >
                      <Avatar user={detail.profile} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: "17px" }}>
                          {detail.profile.name || "—"}
                        </div>
                        <div
                          style={{
                            color: "var(--text-secondary)",
                            fontSize: "13px",
                          }}
                        >
                          {detail.profile.email}
                        </div>
                      </div>
                      <button
                        onClick={removeUser}
                        style={{
                          padding: "8px 14px",
                          borderRadius: "var(--radius-sm)",
                          border: "none",
                          background: "var(--danger-soft)",
                          color: "var(--danger)",
                          fontWeight: 600,
                          cursor: "pointer",
                        }}
                      >
                        Ta bort användare
                      </button>
                    </div>

                    <h2 style={sectionTitle}>Tider ({apptRecords.length})</h2>
                    {apptRecords.length === 0 && (
                      <div
                        style={{
                          color: "var(--text-tertiary)",
                          marginBottom: "var(--space-md)",
                        }}
                      >
                        Inga tider.
                      </div>
                    )}
                    {apptRecords.map((rec) => {
                      const b = rec.data || {};
                      const cancelled = b.status === "cancelled";
                      return (
                        <div
                          key={rec.id}
                          style={{
                            display: "flex",
                            alignItems: "center",
                            gap: "var(--space-md)",
                            padding: "var(--space-md)",
                            marginBottom: "var(--space-sm)",
                            borderRadius: "var(--radius-md)",
                            border: "1px solid var(--border-color)",
                            background: "var(--bg-elevated)",
                            opacity: cancelled ? 0.6 : 1,
                          }}
                        >
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontWeight: 600 }}>
                              {b.doctorName || b.doctorId || rec.collection}
                            </div>
                            <div
                              style={{
                                fontSize: "12px",
                                color: "var(--text-tertiary)",
                              }}
                            >
                              {b.start
                                ? `${fmtShortDate(new Date(b.start))} ${fmtTimeD(new Date(b.start))}`
                                : ""}{" "}
                              · {b.status || "—"}
                            </div>
                          </div>
                          {!cancelled && (
                            <button
                              style={miniBtn}
                              onClick={() => cancelRec(rec)}
                            >
                              Avboka
                            </button>
                          )}
                          <button
                            style={{ ...miniBtn, color: "var(--danger)" }}
                            onClick={() => deleteRec(rec)}
                          >
                            Ta bort
                          </button>
                        </div>
                      );
                    })}

                    <h2
                      style={{ ...sectionTitle, marginTop: "var(--space-xl)" }}
                    >
                      Sparad data ({appDataEntries.length})
                    </h2>
                    {appDataEntries.length === 0 && (
                      <div
                        style={{
                          color: "var(--text-tertiary)",
                          marginBottom: "var(--space-sm)",
                        }}
                      >
                        Ingen sparad data.
                      </div>
                    )}
                    {appDataEntries.map(([k, v]) => (
                      <AdminDataRow
                        key={k}
                        dataKey={k}
                        value={v}
                        onSave={(raw) => saveData(k, raw)}
                        onDelete={() => deleteData(k)}
                      />
                    ))}
                    <div
                      style={{
                        display: "flex",
                        gap: "var(--space-sm)",
                        marginTop: "var(--space-sm)",
                      }}
                    >
                      <input
                        value={newKey}
                        onChange={(e) => setNewKey(e.target.value)}
                        placeholder="ny-nyckel"
                        style={{
                          flex: 1,
                          padding: "8px 12px",
                          borderRadius: "var(--radius-sm)",
                          border: "1px solid var(--border-color)",
                          background: "var(--bg-elevated)",
                          color: "var(--text-primary)",
                          boxSizing: "border-box",
                        }}
                      />
                      <button
                        style={miniBtn}
                        onClick={addKey}
                        disabled={!newKey.trim()}
                      >
                        Lägg till nyckel
                      </button>
                    </div>
                  </>
                )}
              </div>
            </div>

            <div
              className="card card-pad"
              style={{ marginTop: "var(--space-lg)", maxWidth: 460 }}
            >
              <div style={{ fontWeight: 600, marginBottom: 4 }}>Tidszon</div>
              <div className="tiny" style={{ marginBottom: 12 }}>
                Klinikens tidszon — styr tider, kalender och påminnelser för alla.
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <select
                  className="select"
                  value={tz}
                  onChange={(e) => setTz(e.target.value)}
                  style={{ flex: 1 }}
                >
                  {TIMEZONES.map((z) => (
                    <option key={z} value={z}>
                      {z.replace("_", " ")}
                    </option>
                  ))}
                </select>
                <button
                  className="btn btn-primary"
                  onClick={saveTimezone}
                  disabled={savingTz || tz === clinicTz}
                >
                  {savingTz ? "Sparar…" : "Spara"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      /* ════════════════ App ════════════════ */
      const VIEW_TITLES = {
        appointment: "Boka tid",
        my: "Mina bokningar",
        settings: "Inställningar",
        admin: "Admin",
      };

      function App() {
        const toast = useToast();
        const [authReady, setAuthReady] = useState(false);
        const [client, setClient] = useState(null);
        const [me, setMe] = useState(null);
        const [signingIn, setSigningIn] = useState(false);
        const [sdkError, setSdkError] = useState(null);

        const [view, setView] = useState("appointment");
        const [theme, setThemeState] = useState(() => {
          // Seed from the no-flash cache so initial render matches the DOM
          // attribute the inline <head> script already applied.
          try {
            const t = localStorage.getItem("pulse-theme");
            if (t === "light" || t === "dark") return t;
          } catch {}
          return "dark";
        });
        const [settings, setSettings] = useState(DEFAULT_SETTINGS);
        // Clinic-wide timezone (shared config), loaded on sign-in below. Drives
        // the whole date layer. Set in render — App renders before its children,
        // so ACTIVE_TZ is in place when they compute dates.
        const [clinicTz, setClinicTz] = useState(CLINIC_TZ);
        setActiveTz(clinicTz);
        // Only the signed-in user's OWN appointments (a narrow where:{userId}
        // slice) — powers the bell + "My appointments". The availability grid
        // loads its own per-doctor-per-day slice inside AppointmentView.
        const [myBookings, setMyBookings] = useState([]);
        const [loadingBookings, setLoadingBookings] = useState(true);
        // Bumped on every create/cancel so AppointmentView re-reads its day slice.
        const [bookingsVersion, setBookingsVersion] = useState(0);
        const [modalCtx, setModalCtx] = useState(null);
        const [isAdmin, setIsAdmin] = useState(false);

        const applyTheme = useCallback((t) => {
          setThemeState(t);
          document.documentElement.setAttribute("data-theme", t);
          // Keep the no-flash cache current so the next load opens in this theme.
          try {
            localStorage.setItem("pulse-theme", t);
          } catch {}
        }, []);

        const refreshMyBookings = useCallback(() => {
          if (!me) {
            setMyBookings([]);
            return;
          }
          setLoadingBookings(true);
          Promise.resolve(AppointmentStore.getForUser(me.sub))
            .then((b) => setMyBookings(b))
            .catch(() => setMyBookings([]))
            .finally(() => setLoadingBookings(false));
        }, [me]);

        // Load the Klar Users SDK + wire auth lifecycle
        useEffect(() => {
          let unsub;
          (async () => {
            try {
              const mod = await import(
                /* @vite-ignore */ KLAR_HOST + "/sdk/users.js"
              );
              const c = mod.createKlarUser({ projectId: PROJECT_ID });
              UserSettingsStore.setUser(c);
              AppointmentStore.setUser(c);
              ClinicConfigStore.setUser(c);
              setClient(c);
              setMe(c.getUser());
              setIsAdmin(!!(c.isAdmin && c.isAdmin()));
              unsub = c.onChange((u) => {
                setMe(u || null);
                setIsAdmin(!!(c.isAdmin && c.isAdmin()));
              });
            } catch (e) {
              console.warn("Klar Users SDK failed to load", e);
              setSdkError(e && e.message ? e.message : String(e));
            } finally {
              setAuthReady(true);
            }
          })();
          return () => {
            if (typeof unsub === "function") unsub();
          };
        }, []);

        // Once the owner is signed in, provision AND keep this app's email
        // automations in sync. ensureAutomations creates missing automations and
        // updates existing ones in place (server-side upsert), so editing a
        // template here propagates on the next owner load — no versioning, no
        // delete, and the scheduled "already-sent" memory is preserved.
        useEffect(() => {
          if (isAdmin && client?.admin) {
            client.admin.ensureAutomations(KLAR_AUTOMATIONS).catch(() => {});
          }
        }, [isAdmin, client]);

        // When the signed-in user changes, load their settings + appointments
        useEffect(() => {
          if (!me) {
            applyTheme(theme);
            return;
          }
          let active = true;
          (async () => {
            const s = await UserSettingsStore.getSettings();
            if (!active) return;
            setSettings(s);
            applyTheme(s.theme || "dark");
            // Clinic timezone is shared (not per-user) — every signed-in user
            // reads it so the whole app reasons in the same zone.
            try {
              const tz = await ClinicConfigStore.getTimezone();
              if (active) setClinicTz(tz);
            } catch {}
          })();
          refreshMyBookings();
          return () => {
            active = false;
          };
        }, [me, applyTheme, refreshMyBookings]);

        // Mark app membership once per signed-in user. Keyed on the user id (a
        // stable primitive) — NOT the `me` object, which the SDK may replace on
        // token refresh, which would otherwise re-run this on every change.
        useEffect(() => {
          if (me) UserSettingsStore.markMember();
        }, [me && me.sub]);

        const signIn = async () => {
          if (!client) {
            toast(
              sdkError
                ? "Inloggning ej tillgänglig: " + sdkError
                : "Inloggning ej tillgänglig — Klar-SDK:n kunde inte laddas.",
              "error",
            );
            return;
          }
          setSigningIn(true);
          try {
            await client.signIn();
          } catch (e) {
            toast("Inloggningen avbröts.", "error");
          }
          setSigningIn(false);
        };
        const signOut = () => {
          client && client.signOut();
          setView("appointment");
        };

        const setTheme = (t) => {
          applyTheme(t);
          const s = { ...settings, theme: t };
          setSettings(s);
          UserSettingsStore.saveSettings(s).catch(() => {});
        };

        const saveSettings = async (s) => {
          await UserSettingsStore.saveSettings(s);
          setSettings(s);
          applyTheme(s.theme);
        };

        const confirmBooking = async (data) => {
          try {
            await AppointmentStore.create(data);
            setModalCtx(null);
            setBookingsVersion((v) => v + 1); // re-reads the day slice in the grid
            refreshMyBookings();
            toast("Bokning bekräftad", "success");
          } catch (e) {
            toast(e.message || "Kunde inte boka", "error");
          }
        };

        const cancelBooking = async (b) => {
          if (!window.confirm("Vill du avboka den här tiden?")) return;
          try {
            await AppointmentStore.cancel(b.id);
            setBookingsVersion((v) => v + 1);
            refreshMyBookings();
            toast("Bokning avbokad", "success");
          } catch (e) {
            toast(e.message || "Kunde inte avboka", "error");
          }
        };

        if (!authReady) {
          return (
            <div className="splash">
              <div className="spinner" />
            </div>
          );
        }

        if (!me) {
          return (
            <Landing
              onSignIn={signIn}
              signingIn={signingIn}
              sdkError={sdkError}
              host={KLAR_HOST}
              theme={theme}
              setTheme={applyTheme}
            />
          );
        }

        return (
          <div className="app-shell">
            <Sidebar
              view={view}
              setView={setView}
              isAdmin={isAdmin}
              onSignOut={signOut}
            />
            <div className="app-body">
              <Topbar
                title={VIEW_TITLES[view] || "Boka tid"}
                user={me}
                theme={theme}
                setTheme={setTheme}
                onSignOut={signOut}
                setView={setView}
                bookings={myBookings}
                me={me}
              />
              <div className="view-scroll">
                {view === "appointment" ? (
                  <AppointmentView
                    bookingsVersion={bookingsVersion}
                    openModal={setModalCtx}
                  />
                ) : view === "my" ? (
                  <MyAppointments
                    me={me}
                    bookings={myBookings}
                    loading={loadingBookings}
                    onCancel={cancelBooking}
                    setView={setView}
                  />
                ) : view === "settings" ? (
                  <Settings
                    settings={settings}
                    onSave={saveSettings}
                    theme={theme}
                    setTheme={applyTheme}
                  />
                ) : view === "admin" && isAdmin ? (
                  <AdminView
                    client={client}
                    clinicTz={clinicTz}
                    onTimezoneSaved={setClinicTz}
                  />
                ) : (
                  <AppointmentView
                    bookingsVersion={bookingsVersion}
                    openModal={setModalCtx}
                  />
                )}
              </div>
            </div>

            {modalCtx && (
              <BookingModal
                ctx={modalCtx}
                me={me}
                onClose={() => setModalCtx(null)}
                onConfirm={confirmBooking}
              />
            )}
          </div>
        );
      }

      // Mount exactly once. Klar's preview re-runs this page from a serialized
      // snapshot of the editor's live DOM, which can execute this module TWICE.
      // The window flag makes any second run a no-op; clearing #root drops the
      // baked snapshot so the single real mount starts from an empty container.
      if (!window.__PULSE_MOUNTED__) {
        window.__PULSE_MOUNTED__ = true;
        const rootEl = document.getElementById("root");
        rootEl.innerHTML = "";
        ReactDOM.createRoot(rootEl).render(
          <ToastProvider>
            <App />
          </ToastProvider>,
        );
      }
    </script>
  </body>
</html>
